<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente Inmobiliario · ΩCO AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep-night:  #0B1C17;
      --dark-2:      #112219;
      --forest:      #1A7A52;
      --oco-green:   #2DCA8C;
      --mint:        #5DDBA8;
      --steel:       #7A9E90;
      --fog:         #B8D0C7;
      --white:       #FFFFFF;
      --off-white:   #EEF4F1;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--deep-night);
      color: var(--white);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── FONDO ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 80% 0%, rgba(26,122,82,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 100%, rgba(45,202,140,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0 16px;
      border-bottom: 1px solid rgba(45,202,140,0.08);
      flex-shrink: 0;
      animation: fadeDown 0.5s ease both;
    }

    .back-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(17,34,25,0.7);
      border: 1px solid rgba(45,202,140,0.12);
      display: flex; align-items: center; justify-content: center;
      color: var(--steel);
      font-size: 16px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .back-btn:hover { border-color: rgba(45,202,140,0.3); color: var(--oco-green); background: rgba(45,202,140,0.06); }

    .header-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #1A7A52, #2DCA8C);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700; font-size: 14px;
      color: var(--white);
    }
    .logo-name {
      font-family: var(--font-display);
      font-weight: 700; font-size: 0.95rem;
      color: var(--white); letter-spacing: -0.01em;
    }

    .header-sep { flex: 1; }

    .header-info { text-align: right; }
    .header-title {
      font-family: var(--font-display);
      font-weight: 600; font-size: 0.88rem;
      color: var(--white); letter-spacing: -0.01em;
    }
    .header-sub {
      font-size: 0.70rem; font-weight: 300;
      color: var(--steel); margin-top: 1px;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--oco-green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--oco-green);
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.7); }
    }

    /* ── CHAT WINDOW ── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(45,202,140,0.15) transparent;
    }
    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(45,202,140,0.15); border-radius: 4px; }

    /* ── WELCOME ── */
    .welcome-banner {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 32px 24px 28px;
      background: rgba(17,34,25,0.55);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(45,202,140,0.10);
      border-radius: 20px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }
    .welcome-icon {
      width: 56px; height: 56px; font-size: 28px;
      background: rgba(45,202,140,0.10);
      border: 1px solid rgba(45,202,140,0.18);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .welcome-title {
      font-family: var(--font-display);
      font-size: 1.05rem; font-weight: 700;
      color: var(--white); margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .welcome-sub {
      font-size: 0.82rem; line-height: 1.65;
      color: var(--steel); font-weight: 300; max-width: 360px;
    }

    .suggestion-btn {
      margin-top: 16px;
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(45,202,140,0.08);
      border: 1px solid rgba(45,202,140,0.18);
      border-radius: 100px; padding: 8px 18px;
      font-family: var(--font-display);
      font-size: 0.76rem; font-weight: 500;
      color: var(--mint); cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .suggestion-btn:hover {
      background: rgba(45,202,140,0.14);
      border-color: rgba(45,202,140,0.35);
      transform: translateY(-1px);
    }

    /* ── MESSAGES ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: msgIn 0.3s ease both;
    }
    @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 0.875rem;
      line-height: 1.65;
      font-weight: 400;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: rgba(45,202,140,0.14);
      border: 1px solid rgba(45,202,140,0.22);
      border-bottom-right-radius: 6px;
      color: var(--off-white);
    }
    .msg.agent .bubble {
      background: rgba(17,34,25,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(45,202,140,0.08);
      border-bottom-left-radius: 6px;
      color: var(--white);
      position: relative;
    }
    .msg.agent .bubble::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--oco-green), transparent);
      border-radius: 2px;
    }

    .bubble-file {
      display: flex; align-items: center; gap: 12px;
      background: rgba(17,34,25,0.75);
      border: 1px solid rgba(45,202,140,0.12);
      border-radius: 14px; padding: 12px 16px;
    }
    .file-icon { font-size: 24px; flex-shrink: 0; }
    .file-name { font-size: 0.82rem; font-weight: 500; color: var(--white); }
    .file-size { font-size: 0.70rem; color: var(--steel); margin-top: 2px; }

    .bubble-audio {
      display: flex; align-items: center; gap: 10px;
      background: rgba(17,34,25,0.75);
      border: 1px solid rgba(45,202,140,0.12);
      border-radius: 50px; padding: 10px 16px;
      min-width: 200px;
    }
    .audio-play-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--oco-green);
      border: none; color: var(--deep-night);
      font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .audio-play-btn:hover { transform: scale(1.08); box-shadow: 0 0 12px rgba(45,202,140,0.4); }
    .audio-waveform { display: flex; align-items: center; gap: 2px; flex: 1; height: 24px; }
    .waveform-bar {
      width: 2px; border-radius: 2px;
      background: var(--oco-green); opacity: 0.5; min-height: 3px;
    }
    .audio-dur { font-size: 0.72rem; color: var(--steel); flex-shrink: 0; }

    .msg-time {
      font-size: 0.65rem; color: rgba(122,158,144,0.5);
      margin-top: 4px; padding: 0 4px;
    }

    /* ── TYPING INDICATOR ── */
    #typingIndicator {
      display: none; align-self: flex-start;
      background: rgba(17,34,25,0.75);
      border: 1px solid rgba(45,202,140,0.08);
      border-radius: 18px; border-bottom-left-radius: 6px;
      padding: 12px 18px;
      animation: msgIn 0.3s ease both;
    }
    #typingIndicator.active { display: flex; align-items: center; gap: 5px; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--oco-green); opacity: 0.4;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity:0.4; }
      30%          { transform: translateY(-5px); opacity:1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 0 20px;
      border-top: 1px solid rgba(45,202,140,0.06);
    }

    #filePreviewStrip {
      display: none; flex-wrap: wrap; gap: 8px;
      padding: 8px 0; margin-bottom: 8px;
    }
    #filePreviewStrip.active { display: flex; }
    .file-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(45,202,140,0.08);
      border: 1px solid rgba(45,202,140,0.18);
      border-radius: 100px; padding: 5px 10px 5px 8px;
      font-size: 0.72rem; color: var(--mint); max-width: 200px;
    }
    .file-chip span:nth-child(2) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-chip-remove { cursor: pointer; color: var(--steel); margin-left: 2px; flex-shrink:0; }
    .file-chip-remove:hover { color: #ff6b6b; }

    #inputRow {
      display: flex; align-items: flex-end; gap: 10px;
    }

    .input-box {
      flex: 1;
      display: flex; align-items: flex-end;
      background: rgba(17,34,25,0.70);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(45,202,140,0.14);
      border-radius: 18px;
      padding: 10px 12px;
      gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(45,202,140,0.35);
      box-shadow: 0 0 0 3px rgba(45,202,140,0.06);
    }

    .attach-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--steel); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .attach-btn:hover { color: var(--oco-green); background: rgba(45,202,140,0.08); }

    #messageInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--white); font-family: var(--font-body);
      font-size: 0.90rem; font-weight: 300; line-height: 1.5;
      resize: none; min-height: 24px; max-height: 100px;
    }
    #messageInput::placeholder { color: rgba(122,158,144,0.5); }

    .mic-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: var(--steel); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .mic-btn:hover { color: var(--oco-green); background: rgba(45,202,140,0.08); }

    .send-btn {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--oco-green);
      border: none; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: var(--deep-night);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(45,202,140,0.25);
    }
    .send-btn:hover {
      background: var(--mint);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(45,202,140,0.35);
    }
    .send-btn:active { transform: scale(0.96); }

    /* ── RECORDING ROW ── */
    #recordingRow {
      display: none; align-items: center; gap: 12px;
      background: rgba(17,34,25,0.70);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(45,202,140,0.20);
      border-radius: 18px; padding: 10px 14px;
    }
    #recordingRow.active { display: flex; }

    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff5c5c; flex-shrink: 0;
      animation: recBlink 1s infinite;
    }
    @keyframes recBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #recordingTimer { font-family: var(--font-display); font-size: 0.82rem; font-weight: 600; color: var(--white); min-width: 36px; }

    #vizBars { display: flex; align-items: center; gap: 2px; flex: 1; height: 28px; overflow: hidden; }
    .viz-bar { width: 3px; border-radius: 2px; background: var(--oco-green); min-height: 3px; transition: height 0.08s; }

    .rec-cancel-btn {
      background: none; border: none; cursor: pointer;
      color: var(--steel); font-size: 18px; padding: 4px;
      transition: color 0.2s;
    }
    .rec-cancel-btn:hover { color: #ff6b6b; }
    .rec-send-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--oco-green); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--deep-night); flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .rec-send-btn:hover { background: var(--mint); transform: scale(1.05); }

    input[type="file"] { display: none; }

    /* ── KEYFRAMES ── */
    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:none} }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .app { padding: 0 10px; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <a href="../" class="back-btn" title="Volver">←</a>
    <a href="../" class="header-logo">
      <div class="logo-icon">Ω</div>
      <span class="logo-name">ΩCO AI</span>
    </a>
    <div class="header-sep"></div>
    <div class="header-info">
      <div class="header-title">Agente Inmobiliario</div>
      <div class="header-sub"><span class="status-dot"></span>En línea · Demo</div>
    </div>
  </header>

  <!-- CHAT WINDOW -->
  <div class="chat-window" id="chatMessages">

    <div class="welcome-banner">
      <div class="welcome-icon">🏠</div>
      <div class="welcome-title">Agente Inmobiliario ΩCO AI</div>
      <div class="welcome-sub">Consulta proyectos, precios y disponibilidad. Estoy listo para ayudarte a encontrar la propiedad ideal.</div>
      <button class="suggestion-btn" onclick="injectSuggestion()">
        💬 &nbsp;Consultar sobre Residencia Prime
      </button>
    </div>

    <!-- Typing indicator -->
    <div id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div id="filePreviewStrip"></div>

    <div id="recordingRow">
      <div class="rec-dot"></div>
      <span id="recordingTimer">0:00</span>
      <div id="vizBars"></div>
      <button class="rec-cancel-btn" onclick="cancelRecording()" title="Cancelar">✕</button>
      <button class="rec-send-btn" onclick="sendFromRecording()" title="Enviar">→</button>
    </div>

    <div id="inputRow">
      <div class="input-box">
        <button class="attach-btn" onclick="document.getElementById('docFileInput').click()" title="Adjuntar archivo">📎</button>
        <textarea id="messageInput" placeholder="Escribe tu mensaje..." rows="1"
          oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="mic-btn" onclick="startRecording()" title="Grabar audio">🎙</button>
      </div>
      <button class="send-btn" onclick="sendMessage()">→</button>
    </div>
  </div>

</div>

<input type="file" id="docFileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.png,.jpg,.jpeg" multiple onchange="handleDocFile(event)" />

<script>
// =============================================
// ⚙️  WEBHOOK — reemplazar con URL propia de n8n
// =============================================
const WEBHOOK_URL = "PLACEHOLDER_WEBHOOK_INMOBILIARIA";

// =============================================
// SESSION ID
// =============================================
function getSessionId() {
  const KEY = 'inmo_chat_session_id';
  let id = localStorage.getItem(KEY);
  if (!id) {
    if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
      id = crypto.randomUUID();
    } else {
      id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = (crypto.getRandomValues(new Uint8Array(1))[0] % 16);
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }
    localStorage.setItem(KEY, id);
  }
  return id;
}

// =============================================
// STATE
// =============================================
let pendingFiles       = [];
let isRecording        = false;
let mediaRecorder      = null;
let audioChunks        = [];
let currentStream      = null;
let audioCtx           = null;
let analyserNode       = null;
let animFrameId        = null;
let recordingStartTime = null;
let timerInterval      = null;

// =============================================
// SUGGESTION
// =============================================
function injectSuggestion() {
  const input = document.getElementById('messageInput');
  input.value = 'Hola, quisiera información del proyecto Residencia Prime';
  autoResize(input);
  sendMessage();
}

// =============================================
// HELPERS
// =============================================
function formatTime(d) { return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }); }
function formatDuration(secs) { const s = Math.floor(secs); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function scrollToBottom() { const m = document.getElementById('chatMessages'); m.scrollTop = m.scrollHeight; }
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function getFileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  return {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',txt:'📃',png:'🖼',jpg:'🖼',jpeg:'🖼',webp:'🖼',mp3:'🎵',mp4:'🎬',wav:'🎵',webm:'🎵',ogg:'🎵'}[ext]||'📁';
}

// =============================================
// FILE → BASE64
// =============================================
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// =============================================
// APPEND MESSAGES
// =============================================
function appendMessage(role, content, type = 'text', meta = {}) {
  const container = document.getElementById('chatMessages');
  const typing    = document.getElementById('typingIndicator');
  const wrap      = document.createElement('div');
  wrap.className  = `msg ${role}`;
  let bubbleHTML  = '';

  if (type === 'text') {
    bubbleHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
  } else if (type === 'doc') {
    if (meta.isImage && meta.dataUrl) {
      bubbleHTML = `<div style="max-width:260px;border-radius:14px;overflow:hidden;border:1px solid rgba(45,202,140,0.15);">
        <img src="${meta.dataUrl}" style="width:100%;display:block;cursor:pointer;" onclick="window.open('${meta.dataUrl}','_blank')" /></div>`;
    } else {
      const icon = getFileIcon(meta.name||'archivo');
      const size = meta.size ? formatBytes(meta.size) : '';
      bubbleHTML = `<div class="bubble-file"><span class="file-icon">${icon}</span>
        <div class="file-info"><div class="file-name">${escapeHtml(meta.name||'archivo')}</div><div class="file-size">${size}</div></div></div>`;
    }
  } else if (type === 'audio') {
    const dur  = meta.duration != null ? formatDuration(meta.duration) : '0:00';
    const bars = Array.from({length:24}, () => { const h = Math.floor(Math.random()*18)+4; return `<div class="waveform-bar" style="height:${h}px"></div>`; }).join('');
    bubbleHTML = `<div class="bubble-audio">
      <button class="audio-play-btn" onclick="playAudio(this,'${meta.dataUrl||''}')">▶</button>
      <div class="audio-waveform">${bars}</div><span class="audio-dur">${dur}</span></div>`;
  }

  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = formatTime(new Date());
  wrap.innerHTML = bubbleHTML;
  wrap.appendChild(time);
  container.insertBefore(wrap, typing);
  scrollToBottom();
}

function appendAgentTyping()  { document.getElementById('typingIndicator').classList.add('active');    scrollToBottom(); }
function removeAgentTyping()  { document.getElementById('typingIndicator').classList.remove('active'); }

// =============================================
// SEND MESSAGE
// =============================================
async function sendMessage() {
  const input    = document.getElementById('messageInput');
  const text     = input.value.trim();
  const hasFiles = pendingFiles.length > 0;
  if (!text && !hasFiles) return;
  if (text) appendMessage('user', text, 'text');
  const snapshot = [...pendingFiles];
  snapshot.forEach(f => {
    if (f.type === 'audio') appendMessage('user','','audio',{dataUrl:f.dataUrl,duration:f.duration,name:f.name});
    else appendMessage('user','','doc',{name:f.name,size:f.size});
  });
  input.value = ''; input.style.height = 'auto';
  clearFilePreview();
  await _doFetch(text, snapshot);
}

// =============================================
// RECORDING
// =============================================
async function startRecording() {
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 64; analyserNode.smoothingTimeConstant = 0.75;
    const source = audioCtx.createMediaStreamSource(currentStream);
    source.connect(analyserNode);
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(currentStream, { mimeType });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    isRecording = true; recordingStartTime = Date.now();
    document.getElementById('inputRow').style.display = 'none';
    document.getElementById('filePreviewStrip').classList.remove('active');
    document.getElementById('recordingRow').classList.add('active');
    _initVizBars(); _drawViz();
    document.getElementById('recordingTimer').textContent = '0:00';
    timerInterval = setInterval(() => {
      document.getElementById('recordingTimer').textContent = formatDuration((Date.now()-recordingStartTime)/1000);
    }, 500);
  } catch(err) { alert('No se pudo acceder al micrófono: ' + err.message); }
}

function _initVizBars() {
  const c = document.getElementById('vizBars'); c.innerHTML = '';
  for (let i=0;i<28;i++) { const b=document.createElement('div'); b.className='viz-bar'; c.appendChild(b); }
}
function _drawViz() {
  if (!isRecording||!analyserNode) return;
  animFrameId = requestAnimationFrame(_drawViz);
  const bars=document.querySelectorAll('.viz-bar'), bufLen=analyserNode.frequencyBinCount;
  const data=new Uint8Array(bufLen); analyserNode.getByteFrequencyData(data);
  const step=Math.max(1,Math.floor(bufLen/bars.length));
  bars.forEach((b,i) => { const v=data[Math.min(i*step,bufLen-1)]; b.style.height=Math.max(3,Math.round((v/255)*24))+'px'; b.style.opacity=(0.35+(v/255)*0.65).toFixed(2); });
}
function cancelRecording() {
  _stopRecordingState();
  if (mediaRecorder) { mediaRecorder.onstop = () => { if(currentStream)currentStream.getTracks().forEach(t=>t.stop()); _hideRecordingUI(); }; }
  else _hideRecordingUI();
}
function sendFromRecording() {
  if (!isRecording||!mediaRecorder) return;
  const duration = (Date.now()-recordingStartTime)/1000;
  _stopRecordingState();
  mediaRecorder.onstop = async () => {
    const mimeType = mediaRecorder.mimeType||'audio/webm';
    const blob = new Blob(audioChunks,{type:mimeType});
    const name = `audio_${Date.now()}.webm`;
    const file = new File([blob],name,{type:mimeType});
    const dataUrl = await new Promise((res,rej) => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(blob); });
    if(currentStream)currentStream.getTracks().forEach(t=>t.stop());
    _hideRecordingUI();
    appendMessage('user','','audio',{dataUrl,duration,name});
    await _doFetch('',[{type:'audio',file,name,size:blob.size,dataUrl,duration}]);
  };
}
function _stopRecordingState() {
  isRecording=false; clearInterval(timerInterval); cancelAnimationFrame(animFrameId);
  if(audioCtx){audioCtx.close();audioCtx=null;} analyserNode=null;
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
}
function _hideRecordingUI() {
  document.getElementById('recordingRow').classList.remove('active');
  document.getElementById('inputRow').style.display='flex';
  document.getElementById('recordingTimer').textContent='0:00';
  document.getElementById('vizBars').innerHTML='';
}

// =============================================
// FILE HANDLING
// =============================================
function handleDocFile(e) {
  Array.from(e.target.files).forEach(file => {
    const isImage = file.type.startsWith('image/');
    if (isImage) {
      const reader = new FileReader();
      reader.onload = ev => { pendingFiles.push({type:'doc',file,name:file.name,size:file.size,dataUrl:ev.target.result,isImage:true}); renderFilePreview(); };
      reader.readAsDataURL(file);
    } else { pendingFiles.push({type:'doc',file,name:file.name,size:file.size}); renderFilePreview(); }
  });
  e.target.value = '';
}
function renderFilePreview() {
  const strip = document.getElementById('filePreviewStrip');
  strip.innerHTML = '';
  if (!pendingFiles.length) { strip.classList.remove('active'); return; }
  strip.classList.add('active');
  pendingFiles.forEach((f,i) => {
    const chip = document.createElement('div'); chip.className='file-chip';
    const icon = f.type==='audio'?'🎵':getFileIcon(f.name);
    chip.innerHTML = `<span>${icon}</span><span>${escapeHtml(f.name)}</span><span class="file-chip-remove" onclick="removeFile(${i})">✕</span>`;
    strip.appendChild(chip);
  });
}
function removeFile(i)      { pendingFiles.splice(i,1); renderFilePreview(); }
function clearFilePreview() { pendingFiles=[]; renderFilePreview(); }

// =============================================
// AUDIO PLAYBACK
// =============================================
function playAudio(btn, dataUrl) {
  if (!dataUrl) return;
  const audio = new Audio(dataUrl); audio.play();
  btn.textContent='⏸'; audio.onended=()=>{btn.textContent='▶';};
}

// =============================================
// _doFetch — ENVÍO AL WEBHOOK
// =============================================
async function _doFetch(text, files) {
  const filesPayload = await Promise.all((files||[]).map(async f => {
    let data;
    if (f.dataUrl) { data = f.dataUrl.split(',')[1]; } else { data = await fileToBase64(f.file); }
    return { name:f.name, mimeType:(f.file&&f.file.type)?f.file.type:'application/octet-stream', size:f.size, data };
  }));
  const payload = { sessionId:getSessionId(), messageId:crypto.randomUUID(), message:text||'', timestamp:new Date().toISOString(), files:filesPayload };
  try {
    appendAgentTyping();
    const res = await fetch(WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const ct = res.headers.get('content-type')||'';
    const rawText = await res.text();
    if (!rawText||!rawText.trim()) { removeAgentTyping(); return; }
    if (ct.includes('application/json')) {
      const data = JSON.parse(rawText);
      if (data.chunks && Array.isArray(data.chunks) && data.chunks.length > 0) {
        removeAgentTyping();
        data.chunks.forEach((chunk,index) => {
          setTimeout(() => {
            appendAgentTyping();
            setTimeout(() => { removeAgentTyping(); appendMessage('agent',chunk,'text'); }, 800);
          }, index*2000);
        });
        if (data.files && Array.isArray(data.files) && data.files.length > 0) {
          const totalDelay = data.chunks.length*2000+1000;
          data.files.forEach(f => {
            setTimeout(() => {
              const container=document.getElementById('chatMessages'), typing=document.getElementById('typingIndicator');
              const wrap=document.createElement('div'); wrap.className='msg agent';
              const time=document.createElement('span'); time.className='msg-time'; time.textContent=formatTime(new Date());
              const isImage=f.mimeType&&f.mimeType.startsWith('image/');
              const isVideo=f.mimeType&&f.mimeType.startsWith('video/');
              const isPdf=f.mimeType==='application/pdf';
              if(isImage&&f.url) { wrap.innerHTML=`<div style="max-width:260px;border-radius:14px;overflow:hidden;border:1px solid rgba(45,202,140,0.15);"><img src="${f.url}" style="width:100%;display:block;cursor:pointer;" onclick="window.open('${f.url}','_blank')" onerror="this.parentElement.innerHTML='<div style=padding:12px>⚠️ Error</div>'" />${f.name?`<div style="padding:6px 10px;font-size:0.75rem;color:var(--steel);">${escapeHtml(f.name)}</div>`:''}</div>`; }
              else if(isVideo&&f.url) { wrap.innerHTML=`<div style="max-width:320px;border-radius:14px;overflow:hidden;border:1px solid rgba(45,202,140,0.15);"><iframe src="${f.url}" style="width:100%;height:180px;display:block;border:none;" allow="autoplay" allowfullscreen></iframe></div>`; }
              else if(isPdf&&f.downloadUrl) { wrap.innerHTML=`<div style="max-width:280px;border-radius:14px;overflow:hidden;border:1px solid rgba(45,202,140,0.12);background:rgba(17,34,25,0.75);"><div style="display:flex;align-items:center;gap:12px;padding:12px 14px;"><span style="font-size:28px">📄</span><div><div style="font-size:0.82rem;color:var(--white);">${escapeHtml(f.name||'Documento.pdf')}</div><div style="font-size:0.7rem;color:var(--steel);">PDF</div></div></div><a href="${f.downloadUrl}" target="_blank" style="display:block;padding:9px;text-align:center;font-size:0.78rem;color:var(--oco-green);text-decoration:none;border-top:1px solid rgba(45,202,140,0.08);">⬇️ Descargar</a></div>`; }
              if(wrap.innerHTML) { wrap.appendChild(time); container.insertBefore(wrap,typing); scrollToBottom(); }
            }, totalDelay);
          });
        }
      } else {
        const reply = data.output||data.message||data.response||data.text||(Array.isArray(data)&&data[0]?.output)||JSON.stringify(data);
        removeAgentTyping(); appendMessage('agent', reply||'...', 'text');
      }
    } else {
      removeAgentTyping(); appendMessage('agent', rawText||'...', 'text');
    }
  } catch(err) {
    removeAgentTyping();
    appendMessage('agent', `⚠️ No se pudo conectar con el servidor.\n(${err.message})`, 'text');
  }
}
</script>
